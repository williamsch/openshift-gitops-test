apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-configs-ive
  namespace: openshift-gitops
spec:
  destination:
    namespace: gitops-ive
    server: https://kubernetes.default.svc
  project: default
  source:
    directory:
      recurse: true
    path: cluster
    repoURL: https://github.com/williamsch/openshift-gitops-test.git
    targetRevision: 1.1
