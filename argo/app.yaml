apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-spring-app-ive
  namespace: openshift-gitops
spec:
  destination:
    namespace: gitops-ive
    server: https://kubernetes.default.svc
  project: default
  source:
    directory:
      recurse: true
    path: app
    repoURL: https://github.com/williamsch/openshift-gitops-test.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
